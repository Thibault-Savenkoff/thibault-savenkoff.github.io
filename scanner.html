---
layout: null
---
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scanner ISBN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f; color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
      padding: 0 0 40px;
    }
    header { width: 100%; padding: 24px 20px 8px; text-align: center; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p  { font-size: 13px; color: #666; margin-top: 6px; }

    /* ── Photo preview ── */
    #preview-wrap {
      width: 100%; max-width: 480px; aspect-ratio: 4/3;
      background: #1a1a1a; overflow: hidden; position: relative;
    }
    #preview-img {
      width: 100%; height: 100%; object-fit: contain;
      display: none;
    }
    #placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: #333;
    }
    #placeholder .icon { font-size: 52px; }
    #placeholder p { font-size: 13px; }

    /* ── Status ── */
    #status {
      width: 100%; max-width: 480px; padding: 12px 20px;
      font-size: 13px; color: #888; text-align: center; min-height: 42px;
    }

    /* ── Bouton photo ── */
    #photo-btn-wrap {
      width: calc(100% - 40px); max-width: 440px; margin-bottom: 16px;
    }
    #photo-btn {
      display: block; width: 100%; padding: 16px;
      background: #7c8cf8; color: #fff;
      border: none; border-radius: 12px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      letter-spacing: -0.2px;
    }
    #photo-input { display: none; }

    /* ── Result card ── */
    #result-card {
      display: none; width: calc(100% - 40px); max-width: 440px;
      background: #1c1c1c; border: 1px solid #2e2e2e;
      border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
    }
    #result-card.visible { display: block; }
    #result-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    #isbn-value   { font-size: 28px; font-weight: 700; letter-spacing: 3px; color: #fff; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
    .btn { display: block; width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary   { background: #7c8cf8; color: #fff; margin-bottom: 8px; }
    .btn-secondary { background: #2a2a2a; color: #ccc; }

    /* ── Manual ── */
    #manual { width: calc(100% - 40px); max-width: 440px; }
    #manual p { font-size: 12px; color: #444; text-align: center; margin-bottom: 10px; }
    #manual-row { display: flex; gap: 8px; }
    #manual-input {
      flex: 1; padding: 11px 14px; background: #1c1c1c;
      border: 1px solid #2e2e2e; border-radius: 10px; color: #fff; font-size: 15px;
    }
    #manual-input::placeholder { color: #444; }
    #manual-btn { padding: 11px 16px; background: #2a2a2a; border: none; border-radius: 10px; color: #ccc; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>📚 Scanner ISBN</h1>
  <p>Prenez une photo du code-barres</p>
</header>

<div id="preview-wrap">
  <img id="preview-img" alt="preview">
  <div id="placeholder">
    <div class="icon">📷</div>
    <p>La photo apparaîtra ici</p>
  </div>
</div>

<div id="status">Prêt à scanner</div>

<div id="photo-btn-wrap">
  <button id="photo-btn">📷 Prendre une photo</button>
  <input id="photo-input" type="file" accept="image/*" capture="environment">
</div>

<div id="result-card">
  <div id="result-label">ISBN détecté</div>
  <div id="isbn-value">—</div>
  <button class="btn btn-primary"   id="copy-btn">📋 Copier l'ISBN</button>
  <button class="btn btn-secondary" id="retry-btn">🔄 Réessayer</button>
</div>

<div id="manual">
  <p>— ou saisie manuelle —</p>
  <div id="manual-row">
    <input id="manual-input" type="text" inputmode="numeric" placeholder="9782…">
    <button id="manual-btn">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
  const statusEl   = document.getElementById("status");
  const resultCard = document.getElementById("result-card");
  const isbnValue  = document.getElementById("isbn-value");
  const copyBtn    = document.getElementById("copy-btn");
  const previewImg = document.getElementById("preview-img");
  const placeholder= document.getElementById("placeholder");
  const photoBtn   = document.getElementById("photo-btn");
  const photoInput = document.getElementById("photo-input");

  let detected = "";
  let reader   = null;

  function initReader() {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);
  }

  function showResult(isbn) {
    detected = isbn;
    isbnValue.textContent = isbn;
    resultCard.classList.add("visible");
    statusEl.textContent = "✅ ISBN détecté !";
    photoBtn.textContent = "📷 Autre photo";
  }

  function decodeImage(file) {
    statusEl.innerHTML = '<span class="spinner"></span>Décodage en cours…';
    resultCard.classList.remove("visible");

    const url = URL.createObjectURL(file);

    // Affiche la preview
    previewImg.src = url;
    previewImg.style.display = "block";
    placeholder.style.display = "none";

    const img = new Image();
    img.onload = () => {
      try {
        // Dessine sur canvas pour ZXing
        const canvas  = document.createElement("canvas");
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        const luminance = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const bitmap    = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
        const result    = reader.decode(bitmap);
        const code      = result.getText();

        if ((code.startsWith("978") || code.startsWith("979")) && code.length === 13) {
          showResult(code);
        } else {
          statusEl.textContent = "⚠️ Code détecté mais pas un ISBN : " + code;
        }
      } catch (e) {
        statusEl.textContent = "❌ Pas de code-barres détecté. Réessayez avec plus de lumière.";
      }
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  // ── Bouton photo ──
  photoBtn.addEventListener("click", () => photoInput.click());
  photoInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) decodeImage(file);
    photoInput.value = ""; // reset pour pouvoir reprendre la même photo
  });

  // ── Retry ──
  document.getElementById("retry-btn").addEventListener("click", () => {
    resultCard.classList.remove("visible");
    photoInput.click();
  });

  // ── Copier ──
  function copyToClipboard(text) {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else { fallbackCopy(text); }
  }
  function fallbackCopy(text) {
    const el = document.createElement("textarea");
    el.value = text; el.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(el); el.focus(); el.select();
    document.execCommand("copy"); document.body.removeChild(el);
  }
  copyBtn.addEventListener("click", () => {
    copyToClipboard(detected);
    copyBtn.textContent = "✅ Copié !";
    setTimeout(() => copyBtn.textContent = "📋 Copier l'ISBN", 2500);
  });

  // ── Manuel ──
  document.getElementById("manual-btn").addEventListener("click", () => {
    const val = document.getElementById("manual-input").value.trim();
    if (val) showResult(val);
  });
  document.getElementById("manual-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("manual-btn").click();
  });

  initReader();
</script>
</body>
</html>
