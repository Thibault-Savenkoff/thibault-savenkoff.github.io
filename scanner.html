---
layout: null
---
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scanner ISBN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f; color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
    }
    header { width: 100%; padding: 18px 20px 10px; text-align: center; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { font-size: 13px; color: #888; margin-top: 4px; }

    #viewport {
      position: relative; width: 100%; max-width: 480px;
      aspect-ratio: 4/3; background: #111; overflow: hidden;
    }
    #viewport video, #viewport canvas {
      position: absolute; top: 0; left: 0;
      width: 100% !important; height: 100% !important;
      object-fit: cover;
    }
    #viewport canvas.drawingBuffer { display: none; }

    /* Viseur */
    #crosshair {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .aim {
      position: relative; width: 80%; height: 90px;
      border: 2px solid rgba(255,255,255,0.25); border-radius: 4px;
    }
    .aim::before {
      content: ""; position: absolute;
      left: 0; right: 0; top: 50%; height: 2px;
      background: linear-gradient(90deg, transparent, #7c8cf8 30%, #7c8cf8 70%, transparent);
    }

    #status {
      width: 100%; max-width: 480px; padding: 10px 20px;
      font-size: 13px; color: #888; text-align: center; min-height: 38px;
    }

    #result-card {
      display: none; width: calc(100% - 40px); max-width: 440px;
      background: #1c1c1c; border: 1px solid #2e2e2e;
      border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
    }
    #result-card.visible { display: block; }
    #result-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    #isbn-value   { font-size: 26px; font-weight: 700; letter-spacing: 2px; color: #fff; margin-bottom: 14px; }
    .btn { display: block; width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary   { background: #7c8cf8; color: #fff; margin-bottom: 8px; }
    .btn-secondary { background: #2a2a2a; color: #ccc; }

    #manual { width: calc(100% - 40px); max-width: 440px; margin-top: 4px; padding-bottom: 32px; }
    #manual p { font-size: 12px; color: #555; text-align: center; margin-bottom: 10px; }
    #manual-row { display: flex; gap: 8px; }
    #manual-input {
      flex: 1; padding: 11px 14px; background: #1c1c1c;
      border: 1px solid #2e2e2e; border-radius: 10px; color: #fff; font-size: 15px;
    }
    #manual-input::placeholder { color: #444; }
    #manual-btn { padding: 11px 16px; background: #2a2a2a; border: none; border-radius: 10px; color: #ccc; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>📚 Scanner ISBN</h1>
  <p>Centrez le code-barres dans la zone bleue</p>
</header>

<div id="viewport">
  <div id="crosshair"><div class="aim"></div></div>
</div>
<div id="status">Chargement…</div>

<div id="result-card">
  <div id="result-label">ISBN détecté</div>
  <div id="isbn-value">—</div>
  <button class="btn btn-primary"   id="copy-btn">📋 Copier l'ISBN</button>
  <button class="btn btn-secondary" id="scan-again-btn">🔄 Scanner à nouveau</button>
</div>

<div id="manual">
  <p>— ou saisie manuelle —</p>
  <div id="manual-row">
    <input id="manual-input" type="text" inputmode="numeric" placeholder="9782…">
    <button id="manual-btn">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script>
  const statusEl    = document.getElementById("status");
  const resultCard  = document.getElementById("result-card");
  const isbnValue   = document.getElementById("isbn-value");
  const copyBtn     = document.getElementById("copy-btn");
  const scanAgainBtn= document.getElementById("scan-again-btn");

  let detected = "";
  let running  = false;

  function showResult(isbn) {
    detected = isbn;
    isbnValue.textContent = isbn;
    resultCard.classList.add("visible");
    statusEl.textContent = "✅ ISBN détecté !";
    Quagga.stop();
    running = false;
  }

  function startScanner() {
    resultCard.classList.remove("visible");
    statusEl.textContent = "Démarrage de la caméra…";

    Quagga.init({
      inputStream: {
        type: "LiveStream",
        target: document.getElementById("viewport"),
        constraints: {
          width:  { min: 640 },
          height: { min: 480 },
          facingMode: "environment",
          aspectRatio: { min: 1, max: 2 }
        }
      },
      locator: { patchSize: "medium", halfSample: true },
      numOfWorkers: 0,   // ← obligatoire sur iOS Safari
      frequency: 10,
      decoder: {
        readers: ["ean_reader", "ean_8_reader"],
        debug: { drawBoundingBox: false, showFrequency: false }
      },
      locate: true
    }, function(err) {
      if (err) {
        statusEl.textContent = "❌ " + err.message;
        return;
      }
      Quagga.start();
      running = true;
      statusEl.textContent = "Pointez le code-barres dans la zone";
    });

    Quagga.onDetected(function(result) {
      const code = result.codeResult.code;
      const err  = result.codeResult.decodedCodes
        .filter(x => x.error !== undefined)
        .map(x => x.error);
      const avgErr = err.length ? err.reduce((a,b) => a+b, 0) / err.length : 1;

      // Filtre qualité + ISBN valide
      if (avgErr < 0.15 && code.length === 13 && (code.startsWith("978") || code.startsWith("979"))) {
        showResult(code);
      }
    });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else { fallbackCopy(text); }
  }
  function fallbackCopy(text) {
    const el = document.createElement("textarea");
    el.value = text; el.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(el); el.focus(); el.select();
    document.execCommand("copy"); document.body.removeChild(el);
  }

  copyBtn.addEventListener("click", () => {
    copyToClipboard(detected);
    copyBtn.textContent = "✅ Copié !";
    setTimeout(() => copyBtn.textContent = "📋 Copier l'ISBN", 2500);
  });

  scanAgainBtn.addEventListener("click", startScanner);

  document.getElementById("manual-btn").addEventListener("click", () => {
    const val = document.getElementById("manual-input").value.trim();
    if (val) showResult(val);
  });
  document.getElementById("manual-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("manual-btn").click();
  });

  startScanner();
</script>
</body>
</html>
