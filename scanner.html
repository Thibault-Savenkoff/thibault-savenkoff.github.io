layout: null
---
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scanner ISBN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f; color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
    }
    header { width: 100%; padding: 18px 20px 10px; text-align: center; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { font-size: 13px; color: #888; margin-top: 4px; }

    /* ZXing injecte une div#reader, on la stylise */
    #reader {
      width: 100% !important;
      max-width: 480px;
      border: none !important;
      overflow: hidden;
    }
    /* Cache les éléments superflus de html5-qrcode */
    #reader__dashboard_section_swaplink,
    #reader__filescan_input,
    #reader__status_span { display: none !important; }
    #reader__scan_region { border-radius: 0 !important; }
    #reader video { width: 100% !important; }

    #status {
      width: 100%; max-width: 480px; padding: 10px 20px;
      font-size: 13px; color: #888; text-align: center; min-height: 38px;
    }

    #result-card {
      display: none; width: calc(100% - 40px); max-width: 440px;
      background: #1c1c1c; border: 1px solid #2e2e2e;
      border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
    }
    #result-card.visible { display: block; }
    #result-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    #isbn-value   { font-size: 26px; font-weight: 700; letter-spacing: 2px; color: #fff; margin-bottom: 14px; }

    .btn {
      display: block; width: 100%; padding: 13px; border-radius: 10px;
      border: none; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-primary   { background: #7c8cf8; color: #fff; margin-bottom: 8px; }
    .btn-secondary { background: #2a2a2a; color: #ccc; }

    #manual { width: calc(100% - 40px); max-width: 440px; margin-top: 4px; padding-bottom: 32px; }
    #manual p { font-size: 12px; color: #555; text-align: center; margin-bottom: 10px; }
    #manual-row { display: flex; gap: 8px; }
    #manual-input {
      flex: 1; padding: 11px 14px; background: #1c1c1c;
      border: 1px solid #2e2e2e; border-radius: 10px; color: #fff; font-size: 15px;
    }
    #manual-input::placeholder { color: #444; }
    #manual-btn {
      padding: 11px 16px; background: #2a2a2a; border: none;
      border-radius: 10px; color: #ccc; font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Scanner ISBN</h1>
  <p>Scannez le code-barres d'un livre</p>
</header>

<div id="reader"></div>
<div id="status">Chargement…</div>

<div id="result-card">
  <div id="result-label">ISBN détecté</div>
  <div id="isbn-value">—</div>
  <button class="btn btn-primary"   id="copy-btn">📋 Copier l'ISBN</button>
  <button class="btn btn-secondary" id="scan-again-btn">🔄 Scanner à nouveau</button>
</div>

<div id="manual">
  <p>— ou saisie manuelle —</p>
  <div id="manual-row">
    <input id="manual-input" type="text" inputmode="numeric" placeholder="9782…">
    <button id="manual-btn">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const statusEl    = document.getElementById("status");
  const resultCard  = document.getElementById("result-card");
  const isbnValue   = document.getElementById("isbn-value");
  const copyBtn     = document.getElementById("copy-btn");
  const scanAgainBtn= document.getElementById("scan-again-btn");

  let scanner  = null;
  let detected = "";
  let stopped  = false;

  function showResult(isbn) {
    if (stopped) return;
    stopped  = true;
    detected = isbn;
    isbnValue.textContent = isbn;
    resultCard.classList.add("visible");
    statusEl.textContent  = "✅ Code-barres détecté !";
    if (scanner) scanner.stop().catch(() => {});
  }

  function startScanner() {
    stopped = false;
    resultCard.classList.remove("visible");
    statusEl.textContent = "Pointez vers le code-barres du livre";

    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 280, height: 100 }, aspectRatio: 1.5 },
      (text) => {
        if ((text.startsWith("978") || text.startsWith("979")) && text.length === 13) {
          showResult(text);
        }
      },
      () => {} // ignore scan errors
    ).catch(err => {
      statusEl.textContent = "❌ Caméra inaccessible — utilisez la saisie manuelle.";
      console.error(err);
    });
  }

  // ── Copier ──
  function copyToClipboard(text) {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text) {
    const el = document.createElement("textarea");
    el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.focus(); el.select();
    document.execCommand("copy"); document.body.removeChild(el);
  }

  copyBtn.addEventListener("click", () => {
    copyToClipboard(detected);
    copyBtn.textContent = "✅ Copié !";
    setTimeout(() => copyBtn.textContent = "📋 Copier l'ISBN", 2500);
  });

  scanAgainBtn.addEventListener("click", startScanner);

  // ── Manuel ──
  document.getElementById("manual-btn").addEventListener("click", () => {
    const val = document.getElementById("manual-input").value.trim();
    if (val) showResult(val);
  });
  document.getElementById("manual-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("manual-btn").click();
  });

  startScanner();
</script>
</body>
</html>
